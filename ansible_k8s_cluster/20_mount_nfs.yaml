# Ansible to mount the NFS share to the first node in the cluster
# Not needed for the cluster to function with deployment but may be for adding directories into the NFS share for new deployments

---
- name: Add NFS share to /etc/fstab and mount it
  hosts: k8s_control_plane
  become: yes
  vars:
    # Defined here for easy maintenance
    nfs_subdirs:
      - grafana
      - heimdall
      - homarr
      - influxdb
      - jellyfin
      - pihole
      - pihole-iot
      - plex
      - postgreshomarr
      - nginx

  tasks:
    - name: Ensure NFS share is present and mounted
      ansible.builtin.mount:
        src: "{{ nfs_microk8s_source }}"
        path: "/mnt/microk8s"
        fstype: nfs
        opts: defaults
        state: mounted

    - name: Create required storage subdirectories on NFS share
      ansible.builtin.file:
        path: "/mnt/microk8s/{{ item }}"
        state: directory
        # You can actually set owner/group right here to save time
        owner: "1001"
        group: "1001"
        mode: '0755'
      loop: "{{ nfs_subdirs }}"
      run_once: true

    # OPTIONAL: Separate task if you prefer to keep logic distinct
    - name: Ensure correct ownership on NFS directories
      ansible.builtin.file:
        path: "/mnt/microk8s/{{ item }}"
        owner: "1001"
        group: "1001"
        state: directory
      loop: "{{ nfs_subdirs }}"
      run_once: true