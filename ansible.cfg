
[defaults]
# Give the DMZ router plenty of time to route the packets
timeout = 60
# Stop the "Thundering Herd" connection flood
forks = 3
# Fix the Ubuntu /usr/bin/python missing error permanently
interpreter_python = /usr/bin/python3

[ssh_connection]
# MUST BE TRUE. Stops Ansible from opening 100+ connections per node and triggering rate limits
pipelining = True
# If the DMZ drops a packet, quietly retry instead of failing the pipeline
retries = 3
# Disable ControlMaster to prevent Docker/Semaphore socket corruption, but keep the connection alive
ssh_args = -o ControlMaster=no -o ServerAliveInterval=15 -o ServerAliveCountMax=5 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null